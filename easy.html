<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dessert Hangman - Easy</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

</head>
<body>

<h1> Dessert Hangman - Easy </h1>

<img id="healthImg" src="images/cake8.png" width="200">
